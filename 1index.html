<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de IA - Brainktellion</title>
</head>
<body>
    <h2>Chat de Ia - Brainktellion</h2>
    <div id="chat"></div>
    <input type="text" name="input" id="input" placeholder="Digite sua mensagem">
    <button onclick="sendMessage()">Enviar</button>
    <script>
        const input = document.getElementById("input");
        const chat = document.getElementById("chat");

        const prompt = input.value;
        if (prompt) return;

        chat.innerHTML += `<div class="user"><b>Você:</b> ${prompt}</div>`;


    </script>

</body>
</html>
